<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>InstaBytes</title>
    <link
      rel="shortcut icon"
      href="./assets/images/byte.ico"
      type="image/x-icon"
    />
    <meta
      name="description"
      content="Explore o mundo com Viagem Dev! Veja fotos inspiradoras e histórias de viagens incríveis."
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="logo">Insta<strong>bytes</strong></div>
        <div class="nav-links">
          <button class="login-btn" aria-label="Entrar">Entrar</button>
          <a href="#" class="signup-link" aria-label="Cadastre-se"
            >Cadastre-se</a
          >
        </div>
      </nav>
    </header>
    <main class="profile-container">
      <section class="profile-header">
        <img
          src="./photos/profile-pic.jpeg"
          alt="Foto de perfil de Kayke Oldenbrock, um desenvolvedor apaixonado por viagens."
          class="profile-pic"
        />
        <div class="profile-info">
          <h1>@KuKa_011</h1>
          <p>6 publicações · 952 seguidores · 537 seguindo</p>
        </div>
      </section>
      <section class="image-grid"></section>
    </main>
    <div id="modal" class="modal">
      <span class="close">x</span>
      <img class="modal-content" id="modal-img" />
      <div id="caption"></div>
    </div>
    <script type="module" src="./assets/js/index.js"></script>
  </body>
</html>
